<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宝可梦角色介绍</title>
<link rel='stylesheet prefetch' href='https://fonts.googleapis.com/css?family=Montserrat:400,700'>
<link rel='stylesheet prefetch' href='https://fonts.googleapis.com/css?family=Poppins:400,700'>
<style>
/* 你的全部原始CSS，原样复制 */
*, *:before, *:after {
	-webkit-box-sizing: border-box;
	-moz-box-sizing: border-box;
	box-sizing: border-box;
}
.slider__navi {
	position: absolute;
	top: 50%;
	right: 20px;
	transform: translateY(-50%);
	-webkit-transform: translateY(-50%);
	-moz-transform: translateY(-50%);
	-ms-transform: translateY(-50%);
	-o-transform: translateY(-50%);
	z-index: 999;
}
.slider__navi a {
	display: block;
	height: 6px;
	width: 20px;
	margin: 20px 0;
	text-indent: -9999px;
	box-shadow: none;
	border: none;
	background: rgba(0,0,0,0.2);
}
.slider__navi a.active {
	background: rgba(255,255,255,1);
}
body {
	position: relative;
	font-size: 100%;
	font-family: 'Montserrat', sans-serif;
	font-weight: 400;
	min-height: 100vh;
}
/* 剩余全部CSS省略，直接复制你文档里全部样式即可 */
.flex__container {
	position: absolute;
	top: 0;
	left: 0;
	display: flex;
	display: -webkit-flex;
	display: -moz-flex;
	display: -ms-flex;
	-webkit-flex-flow: row wrap;
	-moz-flex-flow: row wrap;
	-ms-flex-flow: row wrap;
	-o-flex-flow: row wrap;
	flex-flow: row wrap; 
	-webkit-justify-content: flex-start;
	-moz-justify-content: flex-start;
	-ms-justify-content: flex-start;
	-o-justify-content: flex-start;
	justify-content: flex-start;
	height: 100vh;
	width: 100%;
	z-index: 1;
}
.flex__container.flex--active {
	z-index: 2;
}
.text--sub {
	font-size: 12px;
	letter-spacing: 0.5rem;
	text-transform: uppercase;
	margin-bottom: 40px;
}
.text--big {
	font-family: 'Poppins', sans-serif;
	font-size: 7.5em;
	font-weight: 700;
	line-height: 110px;
}
.text--normal {
	font-size: 13px;
	color: rgba(255, 255, 255, 0.8);
	line-height: 22px;
	margin-top: 25px;
}
.text__background {
	font-family: 'Poppins', sans-serif;
	position: absolute;
	left: 80px;
	bottom: -60px;
	color: rgba(0,0,0,0.05);
	font-size: 170px;
	font-weight: 700;
}
.flex__item {
	height: 100vh;
	color: #fff;
	transition: transform 0.1s linear;
}
.flex__item--left {
	display: flex;
	display: -webkit-flex;
	display: -moz-flex;
	display: -ms-flex;
	align-items: center;
	-webkit-align-items: center;
	-moz-align-items: center;
	-ms-align-items: center;
	width: 65%;
	transform-origin: left bottom;
	transition: transform 0.1s linear 0.4s;
	opacity: 0;
	position: relative;
	overflow: hidden;
}
.flex__item--right {
	width: 35%;
	transform-origin: right center;
	transition: transform 0.1s linear 0s;
	opacity: 0;
}
.flex--preStart .flex__item--left,
.flex--preStart .flex__item--right,
.flex--active .flex__item--left,
.flex--active .flex__item--right {
	opacity: 1;
}
/* Piplup */
.flex--piplup .flex__item--left {
	background: #3e9fe6;
}
.flex--piplup .flex__item--right {
	background: #d3eaef;
}
/* Pikachu */
.flex--pikachu .flex__item--left {
	background: #f8d41f;
}
.flex--pikachu .flex__item--right {
	background: #f4ecc5;
}
/* Blaziken */
.flex--blaziken .flex__item--left {
	background: #f64f37;
}
.flex--blaziken .flex__item--right {
	background: #ffebcd;
}
/* Dialga */
.flex--dialga .flex__item--left {
	background: #476089;
}
.flex--dialga .flex__item--right {
	background: #ade8f7;
}
/* Zekrom */
.flex--zekrom .flex__item--left {
	background: #424242;
}
.flex--zekrom .flex__item--right {
	background: #a7bcbb;
}
.flex__content {
	margin-left: 80px;
	width: 55%;
	opacity: 1;
	transform: translate3d(0,0,0);
	transition: transform 0.2s linear 0.2s, opacity 0.1s linear 0.2s;
}
.pokemon__img {
	position: absolute;
	bottom: 20px;
	right: 15%;
	max-height: 40vw;
	opacity: 1;
	transform: translate3d(0,0,0);
	transition: opacity 0.43s 0.6s, transform 0.4s 0.65s cubic-bezier(0, 0.88, 0.4, 0.93);
}
/* Animate-START point */
.flex__container.animate--start .flex__content {
	transform: translate3d(0,-200%,0);
	opacity: 0;
}
.flex__container.animate--start .pokemon__img {
	transform: translate3d(-200px,0,0);
	opacity: 0;
}
/* Animate-END point */
.flex__container.animate--end .flex__item--left {
	transform: scaleY(0);
}
.flex__container.animate--end .flex__item--right {
	transform: scaleX(0);
}
.flex__container.animate--end .flex__content {
	transform: translate3d(0,200%,0);
	opacity: 0;
}
.flex__container.animate--end .pokemon__img {
	transform: translate3d(200px,0,0);
	opacity: 0;
}
/* 语言切换按钮样式 */
.lang-switch {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 9999;
}
.lang-switch button {
    padding: 6px 12px;
    margin: 0 4px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
}
</style>
</head>
<body>
<!-- 语言切换按钮 -->
<div class="lang-switch">
    <button id="zhBtn">中文</button>
    <button id="enBtn">English</button>
</div>

<div class="slider__warpper">
	  <!-- 皮卡丘 -->
	  <div class="flex__container flex--pikachu flex--active" data-slide="1">
		<div class="flex__item flex__item--left">
		  <div class="flex__content">
			<p class="text--sub" data-i18n="pikachu_sub"></p>
			<h1 class="text--big" data-i18n="pikachu_name"></h1>
			<p class="text--normal" data-i18n="pikachu_desc1"></p>
			<p class="text--normal" data-i18n="pikachu_desc2"></p>
		  </div>
		  <p class="text__background" data-i18n="pikachu_name"></p>
		</div>
		<div class="flex__item flex__item--right"></div>
		<img class="pokemon__img" src="https://bkimg.cdn.bcebos.com/pic/8b82b9014a90f603738d517acd46a41bb051f81947ca" />
	  </div>
	  <!-- 波加曼 -->
	  <div class="flex__container flex--piplup animate--start" data-slide="2">
		<div class="flex__item flex__item--left">
		  <div class="flex__content">
			<p class="text--sub" data-i18n="piplup_sub"></p>
			<h1 class="text--big" data-i18n="piplup_name"></h1>
			<p class="text--normal" data-i18n="piplup_desc"></p>
		  </div>
		  <p class="text__background" data-i18n="piplup_name"></p>
		</div>
		<div class="flex__item flex__item--right"></div>
		<img class="pokemon__img" src="https://img2.baidu.com/it/u=1072314796,236140467&fm=253&fmt=auto&app=138&f=PNG?w=500&h=610" />
	  </div>
	  <!-- 火焰鸡 -->
	  <div class="flex__container flex--blaziken animate--start" data-slide="3">
		<div class="flex__item flex__item--left">
		  <div class="flex__content">
			<p class="text--sub" data-i18n="blaziken_sub"></p>
			<h1 class="text--big" data-i18n="blaziken_name"></h1>
			<p class="text--normal" data-i18n="blaziken_desc"></p>
		  </div>
		  <p class="text__background" data-i18n="blaziken_name"></p>
		</div>
		<div class="flex__item flex__item--right"></div>
		<img class="pokemon__img" src="https://bkimg.cdn.bcebos.com/pic/960a304e251f95cad1c849e67840683e6709c93df411" />
	  </div>
	  <!-- 帝牙卢卡 -->
	  <div class="flex__container flex--dialga animate--start" data-slide="4">
		<div class="flex__item flex__item--left">
		  <div class="flex__content">
			<p class="text--sub" data-i18n="dialga_sub"></p>
			<h1 class="text--big" data-i18n="dialga_name"></h1>
			<p class="text--normal" data-i18n="dialga_desc"></p>
		  </div>
		  <p class="text__background" data-i18n="dialga_name"></p>
		</div>
		<div class="flex__item flex__item--right"></div>
		<img class="pokemon__img" src="https://bkimg.cdn.bcebos.com/pic/eac4b74543a98226cee6e2ec8882b9014b90ebd2" />
	  </div>
	  	  <!-- 捷克罗姆 -->
	  <div class="flex__container flex--zekrom animate--start" data-slide="5">
		<div class="flex__item flex__item--left">
		  <div class="flex__content">
			<p class="text--sub" data-i18n="zekrom_sub"></p>
			<h1 class="text--big" data-i18n="zekrom_name"></h1>
			<p class="text--normal" data-i18n="zekrom_desc"></p>
		  </div>
		  <p class="text__background" data-i18n="zekrom_name"></p>
		</div>
		<div class="flex__item flex__item--right"></div>
		<img class="pokemon__img" 
		     src="https://s.pokeuniv.com/pokemon/pgl/644.png"
		     style="max-height: none; height: 80vh; bottom: 75px; right: 10%;" />
	  </div>
	</div>

	<!-- 右侧导航按钮：切换幻灯片的核心，不能删除 -->
	<div class="slider__navi">
	  <a href="#" class="slide-nav active" data-slide="1">pikachu</a>
	  <a href="#" class="slide-nav" data-slide="2">piplup</a>
	  <a href="#" class="slide-nav" data-slide="3">blaziken</a>
	  <a href="#" class="slide-nav" data-slide="4">dialga</a>
	  <a href="#" class="slide-nav" data-slide="5">zekrom</a>
	</div>

<!-- 引入jQuery + 切换动画脚本，必须保留 -->
<script src="https://cdn.jsdelivr.net/npm/jquery@2.1.1/dist/jquery.min.js"></script>
<script type="text/javascript">
	$('.slide-nav').on('click', function(e) {
	  e.preventDefault();
	  var current = $('.flex--active').data('slide'),
		next = $(this).data('slide');
	  $('.slide-nav').removeClass('active');
	  $(this).addClass('active');
	  if (current === next) {
		return false;
	  } else {
		$('.slider__warpper').find('.flex__container[data-slide=' + next + ']').addClass('flex--preStart');
		$('.flex--active').addClass('animate--end');
		setTimeout(function() {
		  $('.flex--preStart').removeClass('animate--start flex--preStart').addClass('flex--active');
		  $('.animate--end').addClass('animate--start').removeClass('animate--end flex--active');
		}, 800);
	  }
	});
</script>

<script src="https://cdn.jsdelivr.net/npm/jquery@2.1.1/dist/jquery.min.js"></script>
<script>
// ====================== 1. 多语言语言包 ======================
const messages = {
    // 中文包
    zh: {
        pikachu_sub: "第一世代宝可梦",
        pikachu_name: "皮卡丘",
        pikachu_desc1: "拜托，皮卡丘比路边的野狗还要多",
        //pikachu_desc2: "由鲁迅奥特曼编写",

        piplup_sub: "第四世代宝可梦",
        piplup_name: "波加曼",
        piplup_desc: "波加曼是神奥地区水系初始宝可梦，第四世代登场。自尊心极强，十分傲娇，很少接受人类投喂的食物。",

        blaziken_sub: "第三世代宝可梦",
        blaziken_name: "火焰鸡",
        blaziken_desc: "火焰鸡是丰缘地区火斗双属性初始宝可梦，第三世代登场。外形类似雄鸡，拥有强大的火焰与格斗能力。",

        dialga_sub: "第四世代宝可梦",
        dialga_name: "帝牙卢卡",
        dialga_desc: "帝牙卢卡是钢龙双属性传说宝可梦，外形类似蜥脚类恐龙，全身带有金属蓝色装甲，掌控时间之力。",

        zekrom_sub: "第五世代宝可梦",
        zekrom_name: "捷克罗姆",
        zekrom_desc: "捷克罗姆是龙电双属性传说宝可梦，属于道之三龙之一，通体黑色装甲，拥有红色双眼，代表理想。"
    },
    // 英文包（原始文案）
    en: {
        pikachu_sub: "Pokemon Gen I",
        pikachu_name: "Pikachu",
        pikachu_desc1: "These more than dogs.",
        //pikachu_desc2: "Source: chinaz.com",

        piplup_sub: "Pokemon Gen IV",
        piplup_name: "Piplup",
        piplup_desc: "Piplup is the Water-type Starter Pokémon of the Sinnoh region. It was introduced in Generation IV. Piplup has a strong sense of self-esteem. It seldom accepts food that people give because of its pride.",

        blaziken_sub: "Pokemon Gen III",
        blaziken_name: "Blaziken",
        blaziken_desc: "Blaziken is the Fire/Fighting-type Starter Pokémon of the Hoenn region, introduced in Generation III. Blaziken is a large, bipedal, humanoid bird-like Pokémon that resembles a rooster.",

        dialga_sub: "Pokemon Gen IV",
        dialga_name: "Dialga",
        dialga_desc: "Dialga is a Steel/Dragon-type Legendary Pokémon. Dialga is a sauropod-like Pokémon. It is mainly blue with some gray, metallic portions, such as its chest plate, which has a diamond in the center.",

        zekrom_sub: "Pokemon Gen V",
        zekrom_name: "Zekrom",
        zekrom_desc: "Zekrom is a Dragon/Electric-type Legendary Pokémon. It is part of the Tao Trio, along with Reshiram and Kyurem. Zekrom is a large, black draconian Pokémon with piercing red eyes."
    }
};

// 当前默认语言
let currentLang = "zh";

// ====================== 2. i18n 渲染核心函数 ======================
function renderLang(lang) {
    // 切换html语言标识
    document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
    const langData = messages[lang];
    // 遍历所有带data-i18n的标签，替换文字
    $("[data-i18n]").each(function(){
        const key = $(this).attr("data-i18n");
        $(this).text(langData[key] || "");
    })
}

// 页面初始化默认渲染中文
renderLang(currentLang);

// 语言切换按钮点击事件
$("#zhBtn").click(function(){
    currentLang = "zh";
    renderLang(currentLang);
})
$("#enBtn").click(function(){
    currentLang = "en";
    renderLang(currentLang);
})

// ====================== 3. 原有轮播切换逻辑（完全保留不动） ======================
$('.slide-nav').on('click', function(e) {
  e.preventDefault();
  var current = $('.flex--active').data('slide'),
    next = $(this).data('slide');
  $('.slide-nav').removeClass('active');
  $(this).addClass('active');
  if (current === next) {
    return false;
  } else {
    $('.slider__warpper').find('.flex__container[data-slide=' + next + ']').addClass('flex--preStart');
    $('.flex--active').addClass('animate--end');
    setTimeout(function() {
      $('.flex--preStart').removeClass('animate--start flex--preStart').addClass('flex--active');
      $('.animate--end').addClass('animate--start').removeClass('animate--end flex--active');
    }, 800);
  }
});

</script>
</body>
</html>
